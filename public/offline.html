<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KerjaKu — Offline</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #141B2E; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 24px; }
        h1 { font-size: 1.25rem; margin-bottom: 8px; }
        p { color: #9AA3B8; font-size: 0.875rem; }
        button { margin-top: 16px; background: #F5A300; color: #141B2E; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div>
        <h1>Sedang offline</h1>
        <p>Halaman ini belum tersimpan. Perubahan yang kamu buat tetap aman di antrean lokal dan akan tersinkron saat online kembali.</p>
        <button onclick="location.reload()">Coba lagi</button>
    </div>
</body>
</html>
