name: Deploy ke aaPanel

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Jalankan test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, gd
          coverage: none

      - name: Install composer deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Siapkan env testing
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: PHPUnit
        run: php artisan test

  deploy:
    name: Build asset & deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build asset Vite
        run: |
          npm ci
          npm run build

      # public/build di-gitignore, jadi hasil build CI dikirim langsung
      # ke server — server tidak perlu Node.js sama sekali.
      - name: Kirim public/build ke server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: 'public/build'
          target: ${{ secrets.DEPLOY_PATH }}
          rm: false
          overwrite: true

      - name: Jalankan deploy script di server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export APP_DIR=${{ secrets.DEPLOY_PATH }}
            bash ${{ secrets.DEPLOY_PATH }}/deploy.sh
