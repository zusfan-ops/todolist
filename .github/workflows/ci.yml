name: CI

# Server tidak menerima SSH masuk, jadi tidak ada job "deploy" di sini.
# Deploy bersifat pull-based: server sendiri polling GitHub tiap menit
# lewat cron (lihat check-deploy.sh) dan menjalankan deploy.sh begitu ada
# commit baru di origin/main — repo public jadi tidak perlu kredensial.
# Workflow ini murni penjaga kualitas: kalau test merah, kamu tahu sebelum
# server sempat menariknya.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: Jalankan test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, gd
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install composer deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Build asset Vite
        # Beberapa test merender halaman penuh (landing, login, dashboard) yang
        # memanggil @vite(...) di layout — tanpa manifest ini gagal dengan
        # ViteManifestNotFoundException, persis kasus 500 di production kemarin.
        run: |
          npm ci
          npm run build

      - name: Siapkan env testing
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: PHPUnit
        run: php artisan test
